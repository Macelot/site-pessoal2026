<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redes Sociais</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body class="text-center mt-5">

    <h2>Me siga nas redes sociais!</h2>

    <div class="d-flex flex-column align-items-center gap-3 mt-3">
        <a href="https://www.facebook.com" target="_blank" class="btn btn-primary">
            <i class="fab fa-facebook-f"></i> Facebook
        </a>
        <a href="https://www.twitter.com" target="_blank" class="btn btn-info text-white">
            <i class="fab fa-twitter"></i> Twitter
        </a>
        <a href="https://www.instagram.com" target="_blank" class="btn btn-danger">
            <i class="fab fa-instagram"></i> Instagram
        </a>
        <a href="https://www.linkedin.com" target="_blank" class="btn btn-primary">
            <i class="fab fa-linkedin-in"></i> LinkedIn
        </a>
        <a href="https://www.youtube.com" target="_blank" class="btn btn-danger">
            <i class="fab fa-youtube"></i> YouTube
        </a>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
