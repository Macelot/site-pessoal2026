<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <fieldset>
        <legend>Situação:</legend>
            <div>Presenças:</div><div> <input type="text" name="" id="presenca" placeholder="Digite as presenças">%</div>
            <br>
            <div><input type="button" value="Verificar" onclick="revisao()">
    </fieldset>  
    <p id="status">
    </p>

 

    <script>
        function revisao(){
            var presenca = eval(document.getElementById('presenca').value);

            if(presenca>=75 ){
                document.getElementById('status').innerHTML="Aprovado";
            }else{
                document.getElementById('status').innerHTML="Reprovado";
            }
        }

    </script>
    
</body>
</html>
