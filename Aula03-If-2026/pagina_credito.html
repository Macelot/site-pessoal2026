<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <fieldset>
        <legend>Oficina:</legend>
            <div>Meses:</div><div> <input type="text" name="" id="mes" placeholder=""></div>
            <br>
            <div>KM: </div><div> <input type="text" name="" id="km" placeholder="" size="8"></div>
            <br>
            <div><input type="button" value="Analisar" onclick="revisao()">
    </fieldset>  
    <p id="status">
    </p>

 

    <script>
        function revisao(){
            var mes = eval(document.getElementById('mes').value);
            var km = eval(document.getElementById('km').value);
            if((mes>12) || (km>10000)){
                document.getElementById('status').innerHTML="Revisar";
            }else{
                document.getElementById('status').innerHTML="";
            }         
        }
    </script>
    
</body>
</html>
