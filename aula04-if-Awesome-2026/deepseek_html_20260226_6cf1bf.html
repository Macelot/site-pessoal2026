<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário com Bootstrap e FontAwesome</title>
    <!-- Bootstrap CSS (somente classes, sem CSS personalizado) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="bg-light d-flex align-items-center min-vh-100">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card shadow-sm border-0 rounded-4">
                    <div class="card-body p-4">
                        <h2 class="text-center mb-4">
                            <i class="fas fa-pen me-2"></i>Cadastro
                        </h2>

                        <!-- Campo Nome com ícone de usuário -->
                        <div class="input-group mb-3">
                            <span class="input-group-text bg-white" id="basic-addon1">
                                <i class="fas fa-user text-secondary"></i>
                            </span>
                            <input type="text" class="form-control" placeholder="Seu nome completo" aria-label="Nome">
                        </div>

                        <!-- Campo E-mail com ícone de carta -->
                        <div class="input-group mb-4">
                            <span class="input-group-text bg-white" id="basic-addon2">
                                <i class="fas fa-envelope text-secondary"></i>
                            </span>
                            <input type="email" class="form-control" placeholder="Seu melhor e-mail" aria-label="E-mail">
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-2 rounded-pill">
                            Enviar <i class="fas fa-arrow-right ms-2"></i>
                        </button>

                        <p class="text-muted text-center small mt-3 mb-0">
                            Ícones posicionados com <strong>input-group</strong> do Bootstrap.
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS (opcional, apenas para comportamentos como tooltips, não necessário para este exemplo) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
